name: 部署 Astro 到 GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  构建:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 拉取代码
        uses: actions/checkout@v4

      - name: 🟢 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 📦 安装 pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: 📚 安装依赖
        run: pnpm install

      - name: 🏗️ 构建项目
        run: pnpm build

      - name: 📤 上传构建结果
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  部署:
    needs: 构建
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 部署到 Pages
        uses: actions/deploy-pages@v4
