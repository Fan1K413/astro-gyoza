name: Astro Build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: 拉取代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装 pnpm（官方推荐方式）
        uses: pnpm/action-setup@v4
        with:
          version: 9   # 或你本地的 pnpm 版本

      - name: 安装依赖
        run: pnpm install

      - name: 构建
        run: pnpm build

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: astro-dist
          path: dist
